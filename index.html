<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SikritPAD</title>
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/utils.css">
</head>

<body>
    <main class="px-8 flex flex-col items-center">
        <h1 class="title-page">SikritPad</h1>
        <!-- PASSWORD SCREEN -->
        <section id="password-screen">
            <div>
                <input type="password" placeholder="Enter password" id="password">
                <button id="submitPassword">
                    Open
                </button>
            </div>
        </section>

        <!-- EDITOR SCREEN -->
        <section id="editor-screen" style="display:none; width:100%; max-width:800px;">

            <div class="flex flex-row justify-center mb-8">
                <button id="saveNote">Save</button>
            </div>

            <textarea id="note-editor" placeholder="Start typing..." style="width:100%; height:70vh;"></textarea>

        </section>

    </main>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
